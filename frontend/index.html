<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Change Detection - MVP</title>
    
    <!-- OpenLayers CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <!-- Bootstrap CSS for basic styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { width: 100%; height: 70vh; }
        .controls-panel { padding: 20px; background-color: #f8f9fa; border-top: 2px solid #e9ecef; height: 30vh; overflow-y: auto;}
        .alert-box { display: none; margin-top: 15px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Satellite Change Detection Platform</span>
        </div>
    </nav>

    <div id="map"></div>
    
    <div class="container-fluid controls-panel">
        <div class="row">
            <div class="col-md-4">
                <h5>Draw Area of Interest (AOI)</h5>
                <p class="text-muted small">Use the drawing tool to define an area to monitor for changes.</p>
                <button id="draw-btn" class="btn btn-primary mb-2">Draw Polygon</button>
                <button id="clear-btn" class="btn btn-secondary mb-2">Clear Map</button>
            </div>
            
            <div class="col-md-4">
                <h5>Vision & Analysis</h5>
                <input type="text" id="aoi-name" class="form-control mb-2" placeholder="Name your AOI">
                
                <!-- NEW GALAXEYE FEATURES -->
                <select id="sensor-type" class="form-select mb-2">
                    <option value="optical">Sensor: Optical (Sentinel-2)</option>
                    <option value="sar">Sensor: SAR (Sentinel-1 GRD)</option>
                </select>
                <input type="text" id="vqa-query" class="form-control mb-2" placeholder="VLM Query (e.g. Any new structures?)">
                <!-- END FEATURES -->
                
                <button id="analyze-btn" class="btn btn-success" disabled>Analyze Changes</button>
                
                <div id="status-spinner" class="spinner-border spinner-border-sm text-primary ms-2 d-none" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
            
            <div class="col-md-4">
                <h5>Change Alerts</h5>
                <div id="alert-box" class="alert alert-warning alert-box" role="alert">
                    <h6 class="alert-heading">Changes Detected!</h6>
                    <p id="alert-message" class="mb-0"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- OpenLayers JS -->
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script src="app.js?v=4"></script>
</body>
</html>
